<!DOCTYPE html>
<html>
<head>
    <title>Crossword Solver</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: linear-gradient(to right, #36d1dc, #5b86e5);
            color: white;
        }

        h1 {
            margin-top: 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(5, 50px);
            gap: 5px;
            justify-content: center;
            margin: 20px;
        }

        input.cell {
            width: 50px;
            height: 50px;
            text-align: center;
            font-size: 20px;
            border-radius: 5px;
            border: none;
        }

        .black {
            background-color: black;
            color: white;
        }

        .filled {
